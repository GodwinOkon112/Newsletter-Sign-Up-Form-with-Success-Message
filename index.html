<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Frontend Mentor | Newsletter sign-up form with success message
    </title>
    <link rel="stylesheet" href="style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <!-- Sign-up form start -->
    <main>
      <section class="text__box">
        <h1 class="text__h1">Stay updated!</h1>
        <p class="text__p">
          Join 60,000+ product managers receiving monthly updates on:
        </p>
        <ul>
          <div class="list__check">
            <img src="./assets/images/icon-list.svg" alt="" />
            <li>Product discovery and building what matters</li>
          </div>
          <div class="list__check">
            <img src="./assets/images/icon-list.svg" alt="" />
            <li>Measuring to ensure updates are a success</li>
          </div>
          <div class="list__check">
            <img src="./assets/images/icon-list.svg" alt="" />
            <li>And much more!</li>
          </div>
          <!--
          -->
        </ul>

        <form action="POST" class="form__container" id="form">
          <div class="email__container">
            <div class="error__parent">

              <h2>Email address</h2>
              <h2 id="error"></h2>
            </div>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="email@company.com"
              class="input__email"
            />
          </div>
          <button class="input__button" type="submit" id="btn">
            Subscribe to monthly newsletter
          </button>
        </form>
      </section>

      <section class="design__box">
        <img
          src="./assets/images/illustration-sign-up-desktop.svg"
          alt="illustration-sign-up"
          class="desktop__img"
        />
        <img
          src="./assets/images/illustration-sign-up-mobile.svg"
          alt="illustration-sign-up"
          class="mobile__img"
        />
        <img
          src="./assets/images/illustration-sign-up-tablet.svg"
          alt="illustration-sign-up"
          class="tablet__img"
        />
      </section>
    </main>
    <!-- Sign-up form end -->

    <!-- Success message start -->

    <!-- Thanks for subscribing! A confirmation email has been sent to
    ash@loremcompany.com. Please open it and click the button inside to confirm
    your subscription. Dismiss message -->

    <!-- Success message end -->
  </body>
</html>
